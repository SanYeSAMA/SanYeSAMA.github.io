<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在跳转...</title>
    <style>
        :root {
            --primary-color: #4cd964; /* 微信常用的安全绿 */
            --bg-overlay: rgba(171, 221, 255, 0.267);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 禁止背景滚动 */
            background-color: #fff; /* 白色背景 */
            font-family: -apple-system, sans-serif;
        }

        /* 全屏遮罩层 */
        .fullscreen-guide {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-overlay);
            display: flex;
            flex-direction: column;
            color: white;
            z-index: 9999;
        }

        /* 右上角引导指示 */
        .arrow-box {
            align-self: flex-end;
            margin-top: 10px;
            margin-right: 20px;
            text-align: right;
        }

        .arrow-svg {
            width: 60px;
            height: 60px;
            animation: bounce 1.5s infinite;
        }

        /* 中间内容区 */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            text-align: center;
        }

        .icon-globe {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .highlight {
            color: var(--primary-color);
            font-weight: bold;
        }

        /* 复制区域 */
        .copy-section {
            width: 100%;
            max-width: 300px;
            margin-top: 40px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
        }

        .url-text {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: block;
            word-break: break-all;
        }

        .btn-copy {
            background: white;
            color: black;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-10px) translateX(5px); }
        }
    </style>
    
    <script>
        var ua = navigator.userAgent.toLowerCase();
        var isWeChat = /micromessenger/.test(ua);
        var isQQ = /qq\//.test(ua);

        if (!isWeChat && !isQQ) {
            window.location.href = "https://www.r36844582.nyat.app:65286";
        }

        function copyUrl() {
            var url = "SanYeSAMA.github.io";
            var oInput = document.createElement('input');
            oInput.value = url;
            document.body.appendChild(oInput);
            oInput.select();
            document.execCommand("Copy");
            oInput.remove();
            alert("地址已复制，请打开浏览器粘贴访问");
        }
    </script>
</head>
<body>

<div class="fullscreen-guide">
    <div class="arrow-box">
        <svg class="arrow-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M80 20L50 20M80 20L80 50M80 20L20 80" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p style="margin-top: 5px; font-size: 16px;">点击右上角</p>
    </div>

    <div class="content">
        <div class="icon-globe">🌐</div>
        <h1>请选择 <span class="highlight">“在浏览器打开”</span></h1>
        <p style="opacity: 0.8; line-height: 1.6;">当前环境无法直接访问<br>请切换至系统自带浏览器以继续</p>

        <div class="copy-section">
            <span class="url-text">SanYeSAMA.github.io</span>
            <button class="btn-copy" onclick="copyUrl()">一键复制网址</button>
        </div>
    </div>
</div>

</body>
</html>
