<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SecurityCheck</title>
    <script>
        // 获取浏览器的 userAgent
        var ua = navigator.userAgent.toLowerCase();

        // 判断是否是微信或QQ浏览器
        var isWeChat = /micromessenger/.test(ua);
        var isQQ = /qq\//.test(ua);

        // 如果不是微信也不是QQ，则跳转
        if (!isWeChat && !isQQ) {
            window.location.href = "https://www.r36844582.nyat.app:65286";
        }
    </script>
</head>
<body>
<style>
    .guide-container {
        text-align: center;
        padding: 40px 20px;
        color: #2c3e50;
    }
    .dots {
        display: inline-block;
        background: #eee;
        padding: 2px 8px;
        border-radius: 4px;
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
    }
</style>

<div class="guide-container">
    <h1 style="font-size: 1.5rem;">请点击右上角 <span class="dots">···</span></h1>
    <p style="margin-top: 15px; color: #7f8c8d;">为了更好的体验，请选择在系统浏览器中打开</p>
    <p style="margin-top: 15px; color: #7f8c8d;">或复制地址在浏览器中打开: SanYeSAMA.github.io</p>
</div>
</body>
</html>
