<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安全访问检测</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            width: 85%;
            max-width: 400px;
            background: white;
            padding: 40px 24px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .icon-area {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 20px;
            color: var(--text-main);
            margin: 0 0 12px 0;
            font-weight: 600;
        }

        p {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.6;
            margin: 0 0 24px 0;
        }

        .dots {
            display: inline-block;
            background: #f2f2f7;
            padding: 2px 10px;
            border-radius: 6px;
            color: var(--primary-color);
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        /* 复制区域样式 */
        .copy-box {
            background: #f9f9fb;
            border: 1px dashed #d2d2d7;
            padding: 12px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 13px;
            color: #515154;
            word-break: break-all;
            margin-bottom: 16px;
        }

        .btn-copy {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-copy:active {
            opacity: 0.7;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
    
    <script>
        var ua = navigator.userAgent.toLowerCase();
        var isWeChat = /micromessenger/.test(ua);
        var isQQ = /qq\//.test(ua);

        // 如果是外部浏览器，直接跳转
        if (!isWeChat && !isQQ) {
            window.location.href = "https://www.r36844582.nyat.app:65286";
        }

        // 一键复制功能
        function copyUrl() {
            var url = "SanYeSAMA.github.io";
            var oInput = document.createElement('input');
            oInput.value = url;
            document.body.appendChild(oInput);
            oInput.select();
            document.execCommand("Copy");
            oInput.remove();
            alert("地址已复制，请在浏览器地址栏粘贴访问");
        }
    </script>
</head>
<body>

<div class="card">
    <div class="icon-area">🌐</div>
    <h1>请使用浏览器访问</h1>
    <p>
        由于当前环境限制，请点击右上角 <span class="dots">···</span><br>
        选择 <strong>在浏览器中打开</strong>
    </p>
    
    <div style="margin-top: 30px; border-top: 1px solid #eee; padding: 20px;">
        <p style="margin: 15px 0 8px 0;">或者手动复制地址：</p>
        <div class="copy-box" id="urlText">SanYeSAMA.github.io</div>
        <button class="btn-copy" onclick="copyUrl()">一键复制地址</button>
    </div>
</div>

</body>
</html>
